# GitHub Actions workflow for building and pushing all microservice images, then notifying ArgoCD
# Practices: matrix builds, caching, OIDC for AWS, Image Scanning, unit testing, and ArgoCD sync trigger

name: CI/CD Build and Deploy

# Concurrency group limits running jobs to the latest commit only per PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/**'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Required for AWS OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  code-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Go Unit Tests
        timeout-minutes: 10
        run: |
          for SERVICE in "shippingservice" "productcatalogservice"; do
            echo "testing $SERVICE..."
            pushd src/$SERVICE
            go test
            popd
          done

      - name: C# Unit Tests
        timeout-minutes: 10
        run: |
          dotnet test src/cartservice/

  build-and-push:
    name: Build and Push Images
    needs: code-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - adservice
          - cartservice
          - checkoutservice
          - currencyservice
          - emailservice
          - frontend
          - loadgenerator
          - paymentservice
          - productcatalogservice
          - recommendationservice
          - shippingservice
          - shoppingassistantservice
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/${{ matrix.service }}${{ matrix.service == 'cartservice' && '/src' || '' }}
          push: false
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        uses: docker/build-push-action@v5
        if: success()
        with:
          context: src/${{ matrix.service }}${{ matrix.service == 'cartservice' && '/src' || '' }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha

  argocd-sync:
    name: Trigger ArgoCD Sync
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ArgoCD App Sync
        uses: actions/github-script@v7
        with:
          script: |
            const res = await fetch(process.env.ARGOCD_SYNC_URL, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.ARGOCD_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ app: process.env.ARGOCD_APP_NAME })
            });
            if (!res.ok) throw new Error(`ArgoCD sync failed: ${res.statusText}`);
        env:
          ARGOCD_SYNC_URL: ${{ secrets.ARGOCD_SYNC_URL }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_APP_NAME: online-boutique
